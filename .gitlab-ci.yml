stages:
  - semantic-release
  - build
  - release

variables:
  BINARY_NAME: combine-changelogs

# Runs on every push to the default branch.
# Analyzes conventional commits, determines the next semantic version,
# generates a changelog, and creates a GitLab release + tag.
#
# Requires a GITLAB_TOKEN CI/CD variable (Settings → CI/CD → Variables)
# with `api` scope — CI_JOB_TOKEN does not have permission to push tags.
semantic-release:
  stage: semantic-release
  image:
    name: ghcr.io/go-semantic-release/semantic-release:latest
    entrypoint: [""]
  script:
    - semantic-release --provider gitlab --provider-opt "gitlab_baseurl=${CI_SERVER_URL}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Reusable build template — cross-compiles for Linux.
# Set GOARCH in the extending job.
.build:
  stage: build
  image: golang:alpine
  script:
    - GOOS=linux go build -o ${BINARY_NAME}-linux-${GOARCH} .
  artifacts:
    paths:
      - ${BINARY_NAME}-linux-${GOARCH}
    # Only needs to survive long enough for the upload job to pick it up.
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

build:amd64:
  extends: .build
  variables:
    GOARCH: amd64

build:arm64:
  extends: .build
  variables:
    GOARCH: arm64

# Uploads the compiled binaries to the Generic Packages Registry and attaches
# them as downloadable assets to the release that go-semantic-release created.
upload-binaries:
  stage: release
  image: alpine:latest
  needs:
    - job: build:amd64
      artifacts: true
    - job: build:arm64
      artifacts: true
  before_script:
    - apk add --no-cache curl
  script:
    - |
      for GOARCH in amd64 arm64; do
        DOWNLOAD_URL="${CI_PROJECT_URL}/-/packages/generic/${BINARY_NAME}/${CI_COMMIT_TAG}/${BINARY_NAME}-linux-${GOARCH}"

        # Upload binary to the Generic Packages Registry
        curl --fail --show-error \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "${BINARY_NAME}-linux-${GOARCH}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${CI_COMMIT_TAG}/${BINARY_NAME}-linux-${GOARCH}"

        # Attach the uploaded file as an asset link on the existing release
        curl --fail --show-error \
          --request POST \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "{\"name\":\"${BINARY_NAME}-linux-${GOARCH}\",\"url\":\"${DOWNLOAD_URL}\",\"link_type\":\"package\"}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}/assets/links"
      done
  rules:
    - if: $CI_COMMIT_TAG
