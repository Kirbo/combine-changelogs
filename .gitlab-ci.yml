stages:
  - init
  - build
  - docker
  - release

workflow:
  rules:
    # Run pipeline for merge requests
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    # Run pipeline for pushes to default branch
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    # Run pipeline for pushes to branches without open merge requests
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    # Run pipeline for all other branch pushes
    - if: '$CI_COMMIT_BRANCH'
    # Run pipeline for web/api triggers
    - if: '$CI_PIPELINE_SOURCE == "web"'

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDER_NAME: "builder-${CI_JOB_ID}"
  DOCKERHUB_REPOSITORY: "kirbownz/${BINARY_NAME}"
  IMAGE_NAME: ${DOCKERHUB_REPOSITORY}
  BINARY_NAME: combine-changelogs
  GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
  GIT_STRATEGY: clone

# Default configuration for all jobs
default:
  # Prefer private runner (macos tag), fallback to shared runners if unavailable
  # Jobs without the macos tag will use shared runners automatically
  tags:
    - macos

bump version:
  stage: init
  image:
    name: registry.gitlab.com/go-semantic-release/semantic-release:latest
    entrypoint: [""]
  interruptible: true
  rules:
    - if: '$CI_COMMIT_TAG == null'
  cache: []
  artifacts:
    paths:
      - .version-unreleased
      - build.env
      - CHANGELOG.md
    expire_in: never
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git remote set-url origin "$CI_REPOSITORY_URL" || echo 'Not a git repository; skipping'
    - git fetch --tags --force || true
    - git fetch origin "$CI_DEFAULT_BRANCH" || true
  script:
    - semantic-release --version-file --changelog CHANGELOG.md --dry
    - export VERSION=$(cat .version-unreleased)
    - echo "VERSION=${VERSION}" > build.env
    - echo "sonar.projectVersion=${VERSION}" >> sonar-project.properties
    - cat CHANGELOG.md

# Reusable build template — cross-compiles for Linux.
# Set GOARCH in the extending job.
.build:
  stage: build
  image: golang:alpine
  artifacts:
    paths:
      - ${BINARY_NAME}-linux-${GOARCH}
    # Only needs to survive long enough for the upload job to pick it up.
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_TAG == null'
  script:
    - GOOS=linux go build -o ${BINARY_NAME}-linux-${GOARCH} .

build:amd64:
  extends: .build
  variables:
    GOARCH: amd64

build:arm64:
  extends: .build
  variables:
    GOARCH: arm64

# Builds multi-platform Docker images (amd64 + arm64) and pushes them to Docker Hub.
# Runs after upload-binaries so the binaries are available in the packages registry
# for the install script to download during the Docker build.
#
# Requires DOCKERHUB_USERNAME and DOCKERHUB_PASSWORD CI/CD variables.
build-and-push-docker:
  stage: docker
  image: docker:latest
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
  needs:
    - job: bump version
      artifacts: true
    - job: build:amd64
      artifacts: true
    - job: build:arm64
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG == null'
  before_script:
    - export BUILDER_NAME="${DOCKER_BUILDER_NAME:-shared-ci-builder}"
    - docker buildx inspect "${BUILDER_NAME}" >/dev/null 2>&1 || docker buildx create --name "${BUILDER_NAME}" --driver docker-container --use
    - echo "${DOCKERHUB_PASSWORD}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin "${DOCKERHUB_REGISTRY}"
  script:
    - source build.env
    - |
      docker buildx build \
        --builder "${BUILDER_NAME}" \
        --platform linux/amd64,linux/arm64 \
        --build-arg VERSION=${VERSION} \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        --build-arg VCS_REF=${CI_COMMIT_SHORT_SHA} \
        --provenance=true \
        --sbom=true \
        -t ${DOCKERHUB_REGISTRY}/${DOCKERHUB_REPOSITORY}:latest \
        -t ${DOCKERHUB_REGISTRY}/${DOCKERHUB_REPOSITORY}:${VERSION} \
        --push \
        -f docker/Dockerfile .


# Runs on every push to the default branch.
# Analyzes conventional commits, determines the next semantic version,
# generates a changelog, and creates a GitLab release + tag.
#
# Requires a GITLAB_TOKEN CI/CD variable (Settings → CI/CD → Variables)
# with `api` scope — CI_JOB_TOKEN does not have permission to push tags.
semantic-release:
  stage: release
  image:
    name: registry.gitlab.com/go-semantic-release/semantic-release:latest
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_TAG == null'
  script:
    - semantic-release --provider gitlab --provider-opt "gitlab_baseurl=${CI_SERVER_URL}"


# Uploads the compiled binaries to the Generic Packages Registry and attaches
# them as downloadable assets to the release that go-semantic-release created.
upload-binaries:
  stage: release
  image: alpine:latest
  needs:
    - job: semantic-release
    - job: bump version
      artifacts: true
    - job: build:amd64
      artifacts: true
    - job: build:arm64
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG == null'
  before_script:
    - apk add --no-cache curl
    - source build.env
  script:
    - |
      for GOARCH in amd64 arm64; do
        DOWNLOAD_URL="${CI_PROJECT_URL}/-/packages/generic/${BINARY_NAME}/${VERSION}/${BINARY_NAME}-linux-${GOARCH}"

        # Upload binary to the Generic Packages Registry
        curl --fail --show-error \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "${BINARY_NAME}-linux-${GOARCH}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${VERSION}/${BINARY_NAME}-linux-${GOARCH}"

        # Attach the uploaded file as an asset link on the existing release
        curl --fail --show-error \
          --request POST \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "{\"name\":\"${BINARY_NAME}-linux-${GOARCH}\",\"url\":\"${DOWNLOAD_URL}\",\"link_type\":\"package\"}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/v${VERSION}/assets/links"
      done
